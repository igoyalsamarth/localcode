services:
  rabbitmq:
    # Plain broker only (AMQP). The *-management* image enables management UI, Prometheus,
    # federation, etc.; Dramatiq only needs port 5672.
    image: rabbitmq:3.13
    container_name: greagent-rabbitmq
    ports:
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - greagent-network

  api-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: greagent-api-backend
    command: uv run api-backend
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - greagent-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run worker
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - greagent-network
    restart: unless-stopped
    deploy:
      replicas: 2

networks:
  greagent-network:
    driver: bridge
