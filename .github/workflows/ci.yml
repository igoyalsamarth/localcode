name: CI

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - develop
      - "feat/**"
  push:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system ruff

      - name: Run ruff check
        run: |
          ruff check . --output-format=github || true
        continue-on-error: true

      - name: Run ruff format check
        run: |
          ruff format --check . || true
        continue-on-error: true

  test:
    name: Test Suite
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[test]"

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=. \
            --cov-report=term-missing \
            -v \
            --tb=short

      - name: Test Summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Python Version:** ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Tests completed!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Coverage report shown in test output above" >> $GITHUB_STEP_SUMMARY

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "✅ All tests passed!"
            exit 0
          else
            echo "❌ Tests failed!"
            exit 1
          fi

  publish-image:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    needs: [test-summary]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write

    outputs:
      # Same tag as docker/metadata-action type=sha,prefix=sha- (short SHA)
      image_ref: ${{ steps.deploy-ref.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR image name (lowercase)
        id: image
        run: |
          name=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image ref for deploy (pinned to this commit)
        id: deploy-ref
        run: |
          short=$(echo '${{ github.sha }}' | cut -c1-7)
          echo "image=ghcr.io/${{ steps.image.outputs.name }}:sha-${short}" >> "$GITHUB_OUTPUT"

  # Configure secrets on the repo or the "production" environment:
  #   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH (absolute path to dir with docker-compose.prod.yml + .env)
  # Optional (private GHCR): GHCR_PULL_USER + GHCR_PULL_TOKEN (PAT with read:packages)
  # Non-default SSH port: set DEPLOY_HOST to "host:port" (see appleboy/ssh-action docs)
  deploy:
    name: Deploy to server (SSH)
    runs-on: ubuntu-latest
    needs: [publish-image]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Pull and restart on host
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GRAGENT_IMAGE: ${{ needs.publish-image.outputs.image_ref }}
          GHCR_USER: ${{ secrets.GHCR_PULL_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          envs: DEPLOY_PATH,GRAGENT_IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -eo pipefail
            cd "$DEPLOY_PATH"
            if [ -n "${GHCR_TOKEN:-}" ] && [ -n "${GHCR_USER:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            export GRAGENT_IMAGE
            docker compose -f docker-compose.prod.yml pull api-backend worker
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
