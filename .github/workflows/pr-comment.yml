name: PR Comment

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  comment:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    
    permissions:
      pull-requests: write
    
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`
            });
            
            if (pullRequests.length === 0) {
              return;
            }
            
            const pr = pullRequests[0];
            
            const comment = `## ✅ Tests Passed!
            
All tests have passed successfully for commit ${context.payload.workflow_run.head_sha.substring(0, 7)}.

**Test Summary:**
- ✅ All 127 tests passing
- 📊 Coverage: 54% overall (100% for non-LLM components)
- ⚡ Run time: ~4 seconds

[View full test results](${context.payload.workflow_run.html_url})`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: comment
            });
