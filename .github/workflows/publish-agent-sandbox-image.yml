# Pushes a minimal git+gh image for Daytona when docker/agent-sandbox changes.
# Image: ghcr.io/<owner>/<repo>-agent-sandbox:sha-<short> (+ latest on main, develop on develop)

name: Publish agent sandbox image

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "docker/agent-sandbox/**"

jobs:
  publish-agent-sandbox:
    name: Build and push agent sandbox to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR image name (lowercase)
        id: image
        run: |
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          owner=$(echo "$repo_lower" | cut -d/ -f1)
          pkg=$(echo "$repo_lower" | cut -d/ -f2)
          echo "name=ghcr.io/${owner}/${pkg}-agent-sandbox" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/agent-sandbox
          file: docker/agent-sandbox/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
