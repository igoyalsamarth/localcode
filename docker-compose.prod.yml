# Production / CD: pull pre-built images from GHCR (built in GitHub Actions).
# Copy or symlink .env from your secrets; set GRAGENT_IMAGE to the tag you want, e.g.
#   GRAGENT_IMAGE=ghcr.io/your-org/gragent-be:latest
#   GRAGENT_IMAGE=ghcr.io/your-org/gragent-be:sha-abc1234
#
# Use `docker compose` (v2+ plugin; v5.x is fine). Do not use legacy `docker-compose` 1.x with these images.
# Routine deploy: ./scripts/deploy-prod.sh (or CI) — pulls/recreates api-backend + worker only.
# Full stack / first host: `docker compose -f docker-compose.prod.yml up -d` (starts RabbitMQ too).
#
# RabbitMQ uses a named volume and is not torn down on routine deploys. Upgrade the broker
# image explicitly when needed (e.g. pull rabbitmq && up -d rabbitmq).
#
# If an older ephemeral RabbitMQ container still exists without this volume, recreate it once:
#   docker stop greagent-rabbitmq && docker rm greagent-rabbitmq
#   docker compose -f docker-compose.prod.yml up -d rabbitmq
# (Queues are recreated by workers on use; only in-flight messages are lost.)

services:
  rabbitmq:
    image: rabbitmq:3.13
    container_name: greagent-rabbitmq
    ports:
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit log [{console,[{enabled,false}]}]
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - greagent-network
    restart: unless-stopped

  api-backend:
    image: ${GRAGENT_IMAGE:?Set GRAGENT_IMAGE to the full ghcr.io/... reference}
    container_name: greagent-api-backend
    command: uv run api-backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - greagent-network
    restart: unless-stopped

  worker:
    image: ${GRAGENT_IMAGE:?Set GRAGENT_IMAGE to the full ghcr.io/... reference}
    container_name: greagent-worker
    command: uv run worker
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - greagent-network
    restart: unless-stopped

networks:
  greagent-network:
    driver: bridge

volumes:
  rabbitmq_data:
